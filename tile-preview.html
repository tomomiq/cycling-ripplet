<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Style Preview</title>
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    integrity="sha512-h9FcoyWjHcOcmEVkxOfTLnmZFWIH0iZhZT1H2TbOq55xssQGEJHEaIm+PgoUaZbRvQTNTluNOEfb1ZRy6D3BOw=="
    crossorigin="anonymous" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f0f0; padding: 16px; }
    h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; color: #333; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .map-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    .map-label { padding: 8px 12px; font-size: 0.85rem; font-weight: 600; color: #222; border-bottom: 1px solid #eee; }
    .map-sub { font-size: 0.75rem; font-weight: 400; color: #888; margin-left: 6px; }
    .map { width: 100%; height: 320px; }
  </style>
</head>
<body>
  <h1>Tile style options — centred over Pyrenees</h1>
  <div class="grid">
    <div class="map-card">
      <div class="map-label">1. CartoDB Voyager <span class="map-sub">modern, clean, readable</span></div>
      <div id="map1" class="map"></div>
    </div>
    <div class="map-card">
      <div class="map-label">2. CartoDB Positron <span class="map-sub">minimal, light grey, elegant</span></div>
      <div id="map2" class="map"></div>
    </div>
    <div class="map-card">
      <div class="map-label">3. Esri World Topo <span class="map-sub">clean topo, muted colours</span></div>
      <div id="map3" class="map"></div>
    </div>
    <div class="map-card">
      <div class="map-label">4. CyclOSM <span class="map-sub">cycling-specific, shows passes &amp; elevation</span></div>
      <div id="map4" class="map"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"
    integrity="sha512-puJW3E/qXDqYp9IfhAI54BJEaWIfloJ7JWs7OeD5i6ruC9JZL1gERT1wjtwXFlh7CjE7ZJ+/vcRZRkIYIb6p4g=="
    crossorigin="anonymous"></script>
  <script>
    var CENTER = [42.5, 1.5];
    var ZOOM   = 7;

    var configs = [
      {
        id: 'map1',
        url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
        attribution: '© <a href="https://carto.com/">CARTO</a> | © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19
      },
      {
        id: 'map2',
        url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
        attribution: '© <a href="https://carto.com/">CARTO</a> | © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19
      },
      {
        id: 'map3',
        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
        attribution: '© <a href="https://www.esri.com/">Esri</a>',
        maxZoom: 18
      },
      {
        id: 'map4',
        url: 'https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png',
        attribution: '© <a href="https://www.cyclosm.org/">CyclOSM</a> | © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 20
      }
    ];

    configs.forEach(function(c) {
      var map = L.map(c.id, { zoomControl: true }).setView(CENTER, ZOOM);
      L.tileLayer(c.url, { attribution: c.attribution, maxZoom: c.maxZoom }).addTo(map);
    });
  </script>
</body>
</html>
